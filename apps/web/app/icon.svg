<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <style>
    @media (prefers-color-scheme: dark) {
      .logo {
        filter: invert(0.9) sepia(0.2) saturate(1.5) hue-rotate(340deg) brightness(1.2);
      }
    }
  </style>
  <image class="logo" href="data:image/png;base64," width="128" height="128" />
</svg>
